name: Update CFO Financial News

# Runs on a schedule (server-side, inside GitHub's own infrastructure —
# not the browser, so there is no CORS restriction here at all) and can
# also be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '0 1,12 * * *'  # 08:00 and 19:00 ICT (UTC+7) — twice a day
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch general financial news a CFO should know today
        run: |
          mkdir -p /tmp/feeds

          # General financial/economic news, not company-specific — Thai economy,
          # global markets, USD/THB, and IT/AI industry trends — restricted to the
          # last 2 days (when:2d) so results stay genuinely "today or yesterday"
          # even across the two daily run times (08:00 / 14:00 ICT).
          declare -a QUERIES=(
            "เศรษฐกิจไทย OR ธนาคารแห่งประเทศไทย OR ตลาดหุ้นไทย when:2d"
            "ตลาดหุ้นโลก OR Fed OR อัตราดอกเบี้ย OR inflation global markets when:2d"
            "ค่าเงินบาท ดอลลาร์ OR USD THB exchange rate when:2d"
            "เทคโนโลยี AI OR อุตสาหกรรม IT ไทย OR artificial intelligence technology industry when:2d"
          )

          CATEGORY_LABELS=("เศรษฐกิจไทย" "ตลาดโลก" "อัตราแลกเปลี่ยน" "เทคโนโลยี/AI")

          INDEX=0
          for QUERY in "${QUERIES[@]}"; do
            ENCODED_QUERY=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$QUERY")
            RSS_URL="https://news.google.com/rss/search?q=${ENCODED_QUERY}&hl=th&gl=TH&ceid=TH:th"
            curl -sf -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "$RSS_URL" -o "/tmp/feeds/feed_${INDEX}.xml" || echo "Query ${INDEX} failed, continuing"
            INDEX=$((INDEX + 1))
            sleep 2  # be polite between requests to the same upstream host
          done

          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import json
          import glob
          from datetime import datetime, timezone
          from email.utils import parsedate_to_datetime

          CATEGORY_LABELS = ["เศรษฐกิจไทย", "ตลาดโลก", "อัตราแลกเปลี่ยน", "เทคโนโลยี/AI"]

          # Gambling/spam SEO sites frequently piggyback on finance/exchange-rate
          # searches (a well-known Google News RSS issue). Filter out anything whose
          # title OR link contains these terms before it's ever added to the list.
          BLOCKED_KEYWORDS = [
              "สล็อต", "บาคาร่า", "คาสิโน", "แทงบอล", "หวยออนไลน์", "พนันออนไลน์",
              "เดิมพัน", "ทางเข้า", "เว็บตรง", "เว็บพนัน", "ยูฟ่าเบท",
              "ufabet", "sbobet", "sbo", "pg slot", "pgslot", "joker123",
              "betflik", "ambbet", "เกมยิงปลา", "รูเล็ต", "บอลออนไลน์",
          ]

          def is_blocked(title, link):
              text = (title + " " + link).lower()
              return any(keyword.lower() in text for keyword in BLOCKED_KEYWORDS)

          seen_links = set()
          all_items = []

          for filepath in sorted(glob.glob('/tmp/feeds/feed_*.xml')):
              idx = int(filepath.split('_')[-1].split('.')[0])
              category = CATEGORY_LABELS[idx] if idx < len(CATEGORY_LABELS) else "ทั่วไป"
              try:
                  tree = ET.parse(filepath)
              except ET.ParseError:
                  continue  # skip a feed that failed to fetch/parse, don't crash the whole run

              root = tree.getroot()
              for item in root.findall('./channel/item')[:6]:
                  link = item.findtext('link') or ''
                  if not link or link in seen_links:
                      continue  # de-duplicate the same story appearing in multiple queries

                  title = item.findtext('title') or 'ไม่มีชื่อข่าว'

                  if is_blocked(title, link):
                      continue  # skip gambling/spam SEO content

                  seen_links.add(link)

                  pub_date = item.findtext('pubDate') or ''
                  source_el = item.find('source')
                  source = source_el.text if source_el is not None else ''

                  try:
                      parsed_date = parsedate_to_datetime(pub_date)
                  except (ValueError, TypeError):
                      parsed_date = datetime.min.replace(tzinfo=timezone.utc)

                  all_items.append({
                      "title": title,
                      "link": link,
                      "pubDate": pub_date,
                      "source": source,
                      "category": category,
                      "_sortDate": parsed_date
                  })

          # Most recent first, across all categories combined
          all_items.sort(key=lambda x: x["_sortDate"], reverse=True)
          for item in all_items:
              del item["_sortDate"]

          # Guarantee representation from every category instead of a pure global
          # recency sort-then-truncate, which could silently starve a whole category
          # if its items happen to be a few hours older than a flood of items from
          # other categories on a given run (e.g. finance news publishing more
          # frequently than IT/AI news on any given day).
          MIN_PER_CATEGORY = 3
          MAX_TOTAL = 14

          guaranteed = []
          seen_in_guaranteed = set()
          for label in CATEGORY_LABELS:
              count = 0
              for item in all_items:
                  if item["category"] == label and item["link"] not in seen_in_guaranteed:
                      guaranteed.append(item)
                      seen_in_guaranteed.add(item["link"])
                      count += 1
                      if count >= MIN_PER_CATEGORY:
                          break

          remaining_slots = MAX_TOTAL - len(guaranteed)
          fillers = [item for item in all_items if item["link"] not in seen_in_guaranteed][:max(remaining_slots, 0)]

          final_items = guaranteed + fillers
          # Re-sort the combined set by recency so the final display order still
          # reads newest-first, rather than grouped by category.
          # (pubDate strings are RFC 2822 format; re-parse for sorting)
          def _sort_key(item):
              try:
                  return parsedate_to_datetime(item["pubDate"])
              except (ValueError, TypeError):
                  return datetime.min.replace(tzinfo=timezone.utc)
          final_items.sort(key=_sort_key, reverse=True)

          output = {
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "items": final_items
          }

          # If this run genuinely found nothing across every query (rare, but possible),
          # keep the previous file's items rather than wiping the list to empty.
          if not final_items:
              try:
                  with open('news-data.json', 'r', encoding='utf-8') as f:
                      previous = json.load(f)
                  if previous.get('items'):
                      output['items'] = previous['items']
                      output['staleFallback'] = True
              except (FileNotFoundError, json.JSONDecodeError):
                  pass

          with open('news-data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"Wrote {len(output['items'])} news items")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-data.json
          git diff --quiet --cached || git commit -m "Update CFO financial news digest [automated]"
          git push
